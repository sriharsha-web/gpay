<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Google Pay - A simple and secure payment app">
  <meta name="theme-color" content="#4285F4">
  <title>Google Pay</title>
  <link rel="icon" type="image/png" href="gpay_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Product+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

      <!-- ============ SPLASH SCREEN ============ -->
      <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
          <!-- Animated Google Pay Logo (SVG) -->
          <div class="splash-logo-wrapper">
            <svg class="gpay-svg-logo" viewBox="0 0 48 48" width="80" height="80">
              <!-- Blue circle background -->
              <circle cx="24" cy="24" r="24" fill="#4285F4"/>
              <!-- White G shape -->
              <path d="M24 12c-3.24 0-6.17 1.3-8.31 3.41l2.83 2.83C20.07 16.69 21.93 16 24 16c3.08 0 5.7 1.85 6.84 4.5H26v4h10c.15-.65.25-1.31.25-2C36.25 15.65 30.84 12 24 12z" fill="white"/>
              <path d="M13.17 20.83C12.42 22.39 12 24.15 12 26c0 6.63 5.37 12 12 12 5.94 0 10.87-4.31 11.82-10H26v-4h-2v4H13.17z" fill="white" opacity="0.7"/>
              <!-- Colorful arc accents -->
              <path d="M30.84 20.5C30.3 19.05 29.34 17.8 28.1 16.93" stroke="#EA4335" stroke-width="2.5" stroke-linecap="round" fill="none"/>
              <path d="M28.1 16.93C26.86 16.06 25.37 15.5 23.75 15.5" stroke="#FBBC05" stroke-width="2.5" stroke-linecap="round" fill="none"/>
              <path d="M35.82 28C35.27 30.2 34.07 32.14 32.43 33.57" stroke="#34A853" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            </svg>
            <div class="splash-logo-ring"></div>
          </div>

          <div class="splash-brand">
            <span class="brand-google">
              <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
            </span>
            <span class="brand-pay">Pay</span>
          </div>

          <div class="splash-tagline">India's payment app</div>

          <!-- Animated loading dots -->
          <div class="loading-dots">
            <span class="dot dot-1"></span>
            <span class="dot dot-2"></span>
            <span class="dot dot-3"></span>
            <span class="dot dot-4"></span>
          </div>
        </div>

        <div class="splash-bottom">
          <div class="splash-secured">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#80868b"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/></svg>
            <span>Secured by Google</span>
          </div>
          <div class="splash-region">
            <span class="flag-icon">🇮🇳</span> India
          </div>
        </div>
      </div>

      <!-- ============ MAIN APP SCREEN ============ -->
      <div id="app-screen" class="app-screen hidden">
        <div class="plain-bg"></div>
      </div>

      <!-- ============ MAINTENANCE DIALOG ============ -->
      <div id="maintenance-overlay" class="maintenance-overlay hidden">
        <div class="maintenance-dialog" id="maintenance-dialog">
          <!-- Animated warning icon -->
          <div class="dialog-icon-wrap">
            <div class="dialog-icon-bg">
              <div class="icon-pulse-ring"></div>
              <svg class="warning-svg" width="40" height="40" viewBox="0 0 24 24">
                <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" fill="#D93025"/>
              </svg>
            </div>
          </div>

          <div class="dialog-body">
            <h2 class="dialog-title">Unable to open app</h2>
            <p class="dialog-message">
              Google Pay is currently unavailable due to ongoing scheduled maintenance in your region.
            </p>
            <div class="dialog-region-badge">
              <span class="region-flag">🇮🇳</span>
              <span class="region-name">India</span>
              <span class="region-dot"></span>
              <span class="region-status">Under Maintenance</span>
            </div>
            <p class="dialog-eta">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#80868b"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
              Please try again after a few hours
            </p>
          </div>

          <div class="dialog-actions">
            <button id="ok-button" class="dialog-btn" onclick="closeApp()">
              <span class="btn-text">OK</span>
              <div class="btn-ripple" id="btn-ripple"></div>
            </button>
          </div>
        </div>
      </div>

      <!-- ============ CLOSING ANIMATION ============ -->
      <div id="close-animation" class="close-animation hidden">
        <div class="close-shrink-circle" id="close-circle"></div>
      </div>

      <!-- ============ APP CLOSED (black screen) ============ -->
      <div id="closed-screen" class="closed-screen hidden"></div>

  </div><!-- /app-container -->

  <script src="app.js"></script>
</body>
</html>
